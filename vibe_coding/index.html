<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card | Savinda Rajapathirana</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
</div>
    
    <div class="card-container">
        <div class="profile-card">
            <div class="profile-image-container">
                <img src="C:\Users\USER\Downloads\face.jpg" alt="Savinda Rajapathirana" class="profile-image" onerror="this.src='https://via.placeholder.com/150?text=Savinda'">
            </div>
            <div class="profile-info">
                <h1 class="name">Savinda Rajapathirana</h1>
                <p class="stream">Technology Stream</p>
                <div class="divider"></div>
                <p class="bio">I am an undergraduate student</p>
                <div class="social-icons">
                    <a href="#" class="icon">LinkedIn</a>
                    <a href="#" class="icon">GitHub</a>
                    <a href="#" class="icon">Twitter</a>
                </div>
                <button class="contact-btn">Get In Touch</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
